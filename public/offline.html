<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Offline — Bookcraft</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --text-muted: rgba(255,255,255,0.5);
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem 1.5rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
      text-align: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo-wrap {
      margin-bottom: 2rem;
    }

    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(99,102,241,0.12);
      border: 2px solid rgba(99,102,241,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      position: relative;
    }

    .icon-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--gradient);
      opacity: 0.15;
      filter: blur(8px);
    }

    .wifi-icon {
      width: 44px;
      height: 44px;
      color: #6366f1;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gradient);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 1rem;
      font-weight: 600;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.01em;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .hint {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      margin-bottom: 1.75rem;
      text-align: left;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
    }

    .hint strong {
      display: block;
      color: rgba(139,92,246,0.9);
      margin-bottom: 0.4rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .hint ul { list-style: none; }
    .hint li::before { content: '→ '; color: #6366f1; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0.9rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.97); opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn svg { width: 18px; height: 18px; }
    .btn.spinning svg { animation: spin 0.8s linear infinite; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">bookcraft</span>
    </div>

    <!-- WiFi-off icon -->
    <div class="icon-wrap">
      <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>

    <h1>Du bist offline</h1>
    <p class="subtitle">
      Bookcraft braucht eine Internetverbindung.<br/>
      Heruntergeladene Bücher kannst du weiter lesen.
    </p>

    <div class="hint">
      <strong>Mögliche Ursachen</strong>
      <ul>
        <li>WLAN oder mobile Daten prüfen</li>
        <li>Verbindung kurz trennen und neu verbinden</li>
        <li>Nochmal in ein paar Minuten versuchen</li>
      </ul>
    </div>

    <button class="btn" id="retryBtn" onclick="retry()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-5.5"/>
      </svg>
      Erneut versuchen
    </button>
  </div>

  <div class="footer">bookcraft.dev</div>

  <script>
    function retry() {
      const btn = document.getElementById('retryBtn');
      btn.disabled = true;
      btn.classList.add('spinning');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Verbinde…';

      setTimeout(() => {
        if (navigator.onLine) {
          window.location.href = '/';
        } else {
          btn.disabled = false;
          btn.classList.remove('spinning');
          btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-5.5"/></svg> Erneut versuchen';
        }
      }, 1500);
    }

    // Auto-redirect when back online
    window.addEventListener('online', () => {
      setTimeout(() => { window.location.href = '/'; }, 500);
    });
  </script>
</body>
</html>
