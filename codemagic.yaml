workflows:
  android-internal:
    name: Android Internal Testing (Play Store)
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      groups:
        - android_signing   # ANDROID_KEYSTORE_BASE64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD, ANDROID_STORE_PASSWORD, GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
      node: v22
      java: 21

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build Next.js / web assets
        script: npm run build

      - name: Sync Capacitor Android
        script: npx cap sync android

      - name: Set up signing keystore
        script: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/bookcraft-release.keystore
          echo "✅ Keystore ready"

      - name: Build release AAB
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/bookcraft-release.keystore \
            -Pandroid.injected.signing.store.password="$ANDROID_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

    artifacts:
      - android/app/build/outputs/bundle/release/app-release.aab

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
        track: internal
        submit_as_draft: false
      email:
        recipients:
          - julienbeyer@outlook.com
        notify:
          success: true
          failure: true

  ios-app-store:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Bookcraft

    environment:
      groups:
        - app_store_connect   # enthält CERTIFICATE_P12_BASE64, CERTIFICATE_P12_PASSWORD,
                              # PROVISIONING_PROFILE_BASE64, APP_STORE_CONNECT_PRIVATE_KEY
      vars:
        BUNDLE_ID: "com.bookcraft.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "PKKWNZ4MY8"
        APP_STORE_CONNECT_ISSUER_ID: "2bc664e1-0285-43cb-a8d8-76840e3701b6"
      node: v22
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Build Next.js / web assets
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          # Capacitor 8 requires iOS 15+
          sed -i '' "s/platform :ios, '.*'/platform :ios, '15.0'/" Podfile || true
          pod install

      - name: Set up code signing (manual)
        script: |
          # Install P12 certificate into keychain
          KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain
          KEYCHAIN_PASS="build-keychain-pass"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Decode and import P12
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Install provisioning profile
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | \
            plutil -extract UUID raw -)
          cp /tmp/profile.mobileprovision \
            "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "✅ Profile installed: $UUID"

          # Set ASC API key env vars for xcode-project use-profiles
          export APP_STORE_CONNECT_PRIVATE_KEY="$APP_STORE_CONNECT_PRIVATE_KEY"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$APP_STORE_CONNECT_KEY_IDENTIFIER"
          export APP_STORE_CONNECT_ISSUER_ID="$APP_STORE_CONNECT_ISSUER_ID"

      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>4W9UCL4RHZ</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.bookcraft.app</key>
              <string>Bookcraft App Store</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
          echo "✅ export_options.plist created"

      - name: Configure code signing (use-profiles)
        script: |
          # Auto-detects workspace + scheme, only touches App target (not Pods)
          xcode-project use-profiles

      - name: Build IPA
        script: |
          ARCHIVE_PATH="/tmp/build/App.xcarchive"
          EXPORT_PATH="/tmp/build/ipa"
          mkdir -p "$EXPORT_PATH"

          # Archive - no explicit profile flags, let use-profiles handle it
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -config Release \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            DEVELOPMENT_TEAM=4W9UCL4RHZ \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=iPhone Distribution" \
            | xcpretty || true

          # Export IPA
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath "$EXPORT_PATH"

          # Verify IPA was created
          IPA=$(find "$EXPORT_PATH" -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "❌ No IPA found — check archive step above"
            exit 1
          fi
          echo "✅ IPA: $IPA"

    artifacts:
      - /tmp/build/ipa/*.ipa
      - /tmp/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - julienbeyer@outlook.com
        notify:
          success: true
          failure: true
